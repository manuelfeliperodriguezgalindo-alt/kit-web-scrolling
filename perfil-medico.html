<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E3D6E">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="assets/logo-cuadrado.png">
<title>Mi perfil médico · Reina María IPS</title>
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js">
<link rel="modulepreload" href="./js/firebase-config.js">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--blue:#1E6FB3;--blue-dark:#0E3D6E;--blue-xlight:#EAF3FB;--green:#4FB3A2;--green-dark:#2F8D7B;--green-soft:#E6F4F1;--yellow:#FFD600;--yellow-soft:#FFF8E1;--yellow-dark:#F9A825;--white:#FFFFFF;--gray-50:#F7FAFC;--gray-100:#EEF3F7;--gray-300:#CBD5E0;--gray-500:#6B7280;--gray-600:#4B5563;--text:#1A2233;--error:#DC2626;--shadow:0 4px 18px rgba(14,61,110,0.08);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--gray-50);-webkit-font-smoothing:antialiased;line-height:1.5;}
  a{color:inherit;}
  header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:0.85rem 5%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
  header img{height:38px;background:white;padding:4px 8px;border-radius:8px;}
  header .back{color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.85rem;font-weight:500;}
  header .back:hover{color:var(--yellow);}
  main{max-width:760px;margin:0 auto;padding:1.5rem 5% 4rem;}
  h1.title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,1.9rem);color:var(--blue-dark);margin-bottom:0.3rem;}
  .subtitle{color:var(--gray-600);font-size:0.92rem;margin-bottom:1.5rem;}
  .section{background:var(--white);border-radius:16px;padding:1.4rem;box-shadow:var(--shadow);margin-bottom:1rem;border:1px solid var(--gray-100);}
  .section h2{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--blue-dark);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
  .section h2::before{content:'';width:5px;height:22px;background:var(--green);border-radius:3px;}
  .grid{display:grid;gap:0.75rem;grid-template-columns:1fr;}
  @media(min-width:600px){.grid-2{grid-template-columns:1fr 1fr;}}
  label.field{display:block;}
  label.field .lbl{display:block;font-size:0.74rem;font-weight:600;color:var(--blue-dark);margin-bottom:0.25rem;}
  label.field input{width:100%;padding:0.55rem 0.75rem;border:1.5px solid var(--gray-100);border-radius:8px;font-family:inherit;font-size:0.88rem;outline:none;}
  label.field input:focus{border-color:var(--green);}
  .btn{border:none;cursor:pointer;padding:0.75rem 1.2rem;border-radius:10px;font-size:0.9rem;font-weight:700;font-family:inherit;}
  .btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:white;}
  .btn-success{background:linear-gradient(135deg,var(--green),var(--green-dark));color:white;}
  .btn-ghost{background:transparent;color:var(--gray-600);border:1.5px solid var(--gray-100);}
  .actions{display:flex;gap:0.6rem;margin-top:1.4rem;justify-content:flex-end;flex-wrap:wrap;}
  .alert{padding:0.85rem 1rem;border-radius:10px;font-size:0.88rem;margin-bottom:1rem;display:none;}
  .alert.show{display:block;}
  .alert-error{background:#FEF2F2;color:var(--error);border:1px solid #FECACA;}
  .alert-success{background:var(--green-soft);color:var(--green-dark);border:1px solid #BBF7D0;}
  .alert-info{background:var(--blue-xlight);color:var(--blue-dark);border:1px solid #BBDEFB;}
  .firma-preview { background:var(--gray-50); border-radius:10px; padding:0.6rem; text-align:center; }
  .firma-preview img { max-height: 80px; max-width: 100%; }
</style>
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Reina María IPS" onerror="this.style.display='none'">
  <a class="back" href="dashboard-empleado.html">← Volver al panel</a>
</header>

<main>
  <h1 class="title">Mi perfil médico</h1>
  <p class="subtitle">Tu firma se estampa automáticamente en cada Concepto de Aptitud que firmes. Súbela una sola vez aquí.</p>

  <div id="alert" class="alert"></div>

  <section class="section">
    <h2>Datos profesionales</h2>
    <div class="grid grid-2">
      <label class="field"><span class="lbl">Nombres</span><input id="nombres" type="text"></label>
      <label class="field"><span class="lbl">Apellidos</span><input id="apellidos" type="text"></label>
      <label class="field" style="grid-column:1/-1"><span class="lbl">Registro profesional</span>
        <input id="registro_profesional" type="text" placeholder="Ej. RM-123456">
      </label>
    </div>
  </section>

  <section class="section">
    <h2>Mi firma</h2>
    <div id="firmaActual" class="firma-preview" style="display:none;margin-bottom:0.8rem">
      <div style="font-size:0.78rem;color:var(--gray-500);margin-bottom:0.4rem">Firma actual:</div>
      <img id="firmaActualImg" alt="Firma actual">
    </div>
    <p style="font-size:0.85rem;color:var(--gray-600);margin-bottom:0.8rem">
      Dibuja tu firma en el recuadro. Se guardará en formato PNG transparente.
    </p>
    <div id="hostFirma"></div>
  </section>

  <div class="actions">
    <button class="btn btn-ghost" onclick="window.location.href='dashboard-empleado.html'">Cancelar</button>
    <button class="btn btn-success" id="guardarBtn">✓ Guardar perfil</button>
  </div>
</main>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { firebaseConfig, ROLES } from './js/firebase-config.js';
  import { showEmailGate } from './js/email-gate.js';
  import { montarCapturaFirma } from './js/captura-firma.js';
  import { subirFirmaMedico } from './js/pacientes-helper.js';
  import { showAlert } from './js/utils.js';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser = null;
  let captFirma = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'portal.html'; return; }
    if (!user.emailVerified) { showEmailGate(user, auth); return; }
    const snap = await getDoc(doc(db, 'users', user.uid));
    const ud = snap.exists() ? snap.data() : {};
    if (![ROLES.MEDICO, ROLES.ADMIN].includes(ud.rol)) {
      showAlert('error', 'Esta página es solo para médicos.');
      document.getElementById('guardarBtn').disabled = true;
      return;
    }
    currentUser = user;
    document.getElementById('nombres').value = ud.nombres || '';
    document.getElementById('apellidos').value = ud.apellidos || '';
    document.getElementById('registro_profesional').value = ud.registro_profesional || '';
    if (ud.firma_url) {
      document.getElementById('firmaActual').style.display = '';
      document.getElementById('firmaActualImg').src = ud.firma_url;
    }
    captFirma = await montarCapturaFirma(document.getElementById('hostFirma'), {
      firmaExistenteUrl: ud.firma_url || null
    });
  });

  document.getElementById('guardarBtn').addEventListener('click', async () => {
    if (!currentUser) return;
    const btn = document.getElementById('guardarBtn');
    btn.disabled = true; btn.textContent = 'Guardando…';
    try {
      const payload = {
        nombres:               document.getElementById('nombres').value.trim(),
        apellidos:             document.getElementById('apellidos').value.trim(),
        registro_profesional:  document.getElementById('registro_profesional').value.trim(),
        updatedAt: serverTimestamp()
      };
      // Si hay nueva firma, subirla y actualizar URL
      if (captFirma && !captFirma.isEmpty()) {
        const blob = await captFirma.getBlob();
        const url = await subirFirmaMedico(app, currentUser.uid, blob);
        payload.firma_url = url;
      }
      await setDoc(doc(db, 'users', currentUser.uid), payload, { merge: true });
      showAlert('success', '✓ Perfil actualizado.');
      btn.textContent = '✓ Guardado';
      if (payload.firma_url) {
        document.getElementById('firmaActual').style.display = '';
        document.getElementById('firmaActualImg').src = payload.firma_url + '?t=' + Date.now();
      }
      setTimeout(() => { btn.disabled = false; btn.textContent = '✓ Guardar perfil'; }, 2000);
    } catch (err) {
      console.error(err);
      showAlert('error', 'Error: ' + (err.message || err.code));
      btn.disabled = false; btn.textContent = '✓ Guardar perfil';
    }
  });
</script>
</body>
</html>
