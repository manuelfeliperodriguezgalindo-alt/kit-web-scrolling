<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Reina María IPS</title>
<style>
  body {
    font-family: 'Inter', system-ui, sans-serif;
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0E3D6E, #1E6FB3);
    color: white; padding: 1rem; text-align: center;
  }
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px; padding: 2.5rem 2rem; max-width: 420px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.6rem; font-weight: 600; }
  p  { font-size: 0.92rem; opacity: 0.85; margin-bottom: 1.5rem; line-height: 1.55; }
  a {
    display: inline-block; background: #FFD600; color: #0E3D6E;
    padding: 0.8rem 1.5rem; border-radius: 50px;
    text-decoration: none; font-weight: 700;
  }
</style>
</head>
<body>
  <div class="card">
    <div style="font-size:3rem;margin-bottom:0.5rem">🚧</div>
    <h1>Portal de pacientes desactivado</h1>
    <p>El acceso de pacientes al portal está deshabilitado por ahora. Si tienes un examen, comunícate directamente con la IPS.</p>
    <a href="index.html">← Volver al inicio</a>
  </div>
  <script>
    // Redirige automáticamente tras 4 segundos
    setTimeout(() => { window.location.href = 'index.html'; }, 4000);
  </script>
</body>
</html>
